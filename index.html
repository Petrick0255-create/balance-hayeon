<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>균형잡는 하연이</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <div>
        <h1>균형잡는 하연이</h1>
        <p>Balance Hayeon</p>
      </div>
      <div class="score-box">BEST <span id="bestTime">0.00</span>s</div>
    </header>

    <main>
      <canvas id="gameCanvas"></canvas>

      <section class="panel">
        <div class="timer">TIME <strong id="timeText">0.00</strong>s</div>


        <div class="buttons">
          <button id="resetBtn">다시</button>
        </div>
      </section>
    </main>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
